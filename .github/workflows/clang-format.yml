name: clang-format
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install clang-format
      run: sudo apt install -y cmake clang-format
    - name: clang-format
      run: |
        cmake .
        make lint
